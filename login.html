<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noura — Log in</title>
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/components.css">
</head>
<body data-page="login">

<div class="auth-wrap">
  <div class="auth-visual">
    <div class="hero-bg-shape" style="top:-160px; left:-120px;"></div>
    <div class="hero-bg-shape" style="bottom:-220px; right:-160px; width:480px; height:480px; background:radial-gradient(circle,#2ECC7122,transparent 70%);"></div>
    <img src="assets/burger.jpg" alt="" style="position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:.5; mix-blend-mode:luminosity;">
    <div style="position:relative; z-index:2; max-width:380px;" class="fade-in">
      <span class="eyebrow" data-i18n="landing_eyebrow">AI MEAL COACH</span>
      <h2 class="h-display h2" style="margin-top:10px;" data-i18n="landing_h1">Know what's on your plate, in any language.</h2>
    </div>
  </div>

  <div class="auth-form-col">
    <form class="auth-form fade-in" id="loginForm">
      <div class="brand" style="margin-bottom:var(--sp-6);">
        <span class="mark"></span><span data-i18n="brand">Noura</span>
      </div>
      <h1 class="h-display h2" data-i18n="login_title">Welcome back</h1>
      <p class="text-mid" style="margin-top:8px; margin-bottom:var(--sp-6);" data-i18n="login_sub">Log in to pick up where you left off.</p>

      <div class="field" style="margin-bottom:var(--sp-4);">
        <label data-i18n="login_email">Email</label>
        <input type="email" required placeholder="you@example.com" data-i18n-placeholder="login_email">
      </div>
      <div class="field" style="margin-bottom:var(--sp-2);">
        <label data-i18n="login_pass">Password</label>
        <input type="password" required placeholder="••••••••">
      </div>
      <div style="text-align:end; margin-bottom:var(--sp-5);">
        <a href="#" class="text-mid" style="font-size:0.82rem;" data-i18n="login_forgot">Forgot password?</a>
      </div>

      <button type="submit" class="btn btn-primary btn-block" data-i18n="login_btn">Log in</button>

      <p class="text-mid" style="text-align:center; margin-top:var(--sp-5); font-size:0.88rem;">
        <span data-i18n="login_switch">Don't have an account?</span>
        <a href="signup.html" style="color:var(--violet); font-weight:600;" data-i18n="login_switch_link">Sign up</a>
      </p>

      <div class="hr" style="margin-block:var(--sp-6);"></div>
      <div class="lang-switch" style="margin-inline:auto; width:fit-content;">
        <button type="button" data-lang="en">EN</button>
        <button type="button" data-lang="fr">FR</button>
        <button type="button" data-lang="ar">AR</button>
      </div>
    </form>
  </div>
</div>

<script src="js/i18n.js"></script>
<script src="js/state.js"></script>
<script src="js/app.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', function(e){
  e.preventDefault();
  window.location.href = 'dashboard.html';
});
</script>
</body>
</html>
