<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emina — History</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/tokens.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
</head>
<body data-page="history">

<div class="shell">
  <aside class="sidebar">
    <div class="sidebar-brand"><span class="mark"></span><span class="h-display" style="font-weight:600;" data-i18n="brand">Emina</span></div>
    <nav class="nav-group">
      <a href="dashboard.html" class="nav-item" data-nav="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3"/></svg>
        <span data-i18n="nav_dashboard">Dashboard</span>
      </a>
      <a href="analyze.html" class="nav-item" data-nav="analyze">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 8a2 2 0 0 1 2-2h1l1.5-2h7L17 6h1a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2Z"/><circle cx="12" cy="13" r="3.5"/></svg>
        <span data-i18n="nav_analyze">Analyze</span>
      </a>
      <a href="history.html" class="nav-item" data-nav="history">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3.5 2"/></svg>
        <span data-i18n="nav_history">History</span>
      </a>
      <a href="profile.html" class="nav-item" data-nav="profile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="3.5"/><path d="M4.5 20c1.5-4 5-5.5 7.5-5.5s6 1.5 7.5 5.5"/></svg>
        <span data-i18n="nav_profile">Profile</span>
      </a>
    </nav>
    <div class="sidebar-foot">
      <a href="login.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M15 17v1a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h7a2 2 0 0 1 2 2v1M9 12h11M17 8l3 4-3 4"/></svg>
        <span data-i18n="nav_logout">Log out</span>
      </a>
    </div>
  </aside>

  <main class="main">
    <div style="max-width:760px; margin-inline:auto;">
      <span class="eyebrow" data-i18n="history_eyebrow">YOUR MEALS</span>
      <h1 class="h-display h2" style="margin-top:10px; margin-bottom:var(--sp-5);" data-i18n="history_h1">History</h1>

      <div class="filter-bar" style="margin-bottom:var(--sp-5);">
        <button class="chip selected" data-filter="all" data-i18n="history_all">All</button>
        <button class="chip" data-filter="week" data-i18n="history_week">This week</button>
        <button class="chip" data-filter="month" data-i18n="history_month">This month</button>
      </div>

      <div class="card fade-in" id="historyCard"></div>
    </div>
  </main>
</div>

<nav class="mobile-nav">
  <a href="dashboard.html" data-nav="dashboard"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3"/></svg><span data-i18n="nav_dashboard">Dashboard</span></a>
  <a href="analyze.html" data-nav="analyze"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 8a2 2 0 0 1 2-2h1l1.5-2h7L17 6h1a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2Z"/><circle cx="12" cy="13" r="3.5"/></svg><span data-i18n="nav_analyze">Analyze</span></a>
  <a href="history.html" data-nav="history"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3.5 2"/></svg><span data-i18n="nav_history">History</span></a>
  <a href="profile.html" data-nav="profile"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="3.5"/><path d="M4.5 20c1.5-4 5-5.5 7.5-5.5s6 1.5 7.5 5.5"/></svg><span data-i18n="nav_profile">Profile</span></a>
</nav>

<script src="{{ url_for('static', filename='js/i18n.js') }}"></script>
<script src="{{ url_for('static', filename='js/state.js') }}"></script>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
<script>
function groupByDate(items){
  const groups = {};
  items.forEach(it => { (groups[it.date] = groups[it.date] || []).push(it); });
  return groups;
}
let activeFilter = 'all';
document.querySelectorAll('.filter-bar .chip').forEach(function(btn){
  btn.addEventListener('click', function(){
    document.querySelectorAll('.filter-bar .chip').forEach(c => c.classList.remove('selected'));
    btn.classList.add('selected');
    activeFilter = btn.dataset.filter;
    renderHistory();
  });
});
function renderHistory(){
  const s = NouraState.get();
  let items = s.history.slice().sort((a,b) => b.date.localeCompare(a.date));
  if(items.length){
    const mostRecent = new Date(items[0].date);
    const cutoffDays = activeFilter === 'week' ? 7 : (activeFilter === 'month' ? 30 : Infinity);
    if(cutoffDays !== Infinity){
      items = items.filter(it => (mostRecent - new Date(it.date)) / 86400000 <= cutoffDays);
    }
  }
  const groups = groupByDate(items);
  const card = document.getElementById('historyCard');
  card.innerHTML = '';
  if(items.length === 0){
    card.innerHTML = '<p class="text-mid" style="text-align:center; padding:var(--sp-6) 0;">—</p>';
    return;
  }
  Object.keys(groups).sort().reverse().forEach(function(date, idx){
    if(idx > 0){
      const hr = document.createElement('div');
      hr.className = 'hr';
      hr.style.margin = '4px 0';
      card.appendChild(hr);
    }
    const label = document.createElement('p');
    label.className = 'text-mid mono';
    label.style.cssText = 'font-size:0.76rem; padding:14px 0 4px;';
    label.textContent = date;
    card.appendChild(label);
    groups[date].forEach(function(m){
      const row = document.createElement('div');
      row.className = 'history-item';
      const badgeClass = NouraUI.verdictBadgeClass(m.verdict);
      row.innerHTML = `
        <img class="history-thumb" src="${m.img}" alt="">
        <div style="flex:1; min-width:0;">
          <p style="font-weight:600;">${m.name}</p>
          <p class="text-mid" style="font-size:0.8rem;">${m.time} · <span class="mono">${m.calories}</span> kcal</p>
        </div>
        <span class="badge ${badgeClass} mono">${m.score}</span>
      `;
      card.appendChild(row);
    });
  });
}
renderHistory();
window.addEventListener('noura:langchange', renderHistory);
</script>
</body>
</html>
