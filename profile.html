<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noura — Profile</title>
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/components.css">
</head>
<body data-page="profile">

<div class="shell">
  <aside class="sidebar">
    <div class="sidebar-brand"><span class="mark"></span><span class="h-display" style="font-weight:600;" data-i18n="brand">Noura</span></div>
    <nav class="nav-group">
      <a href="dashboard.html" class="nav-item" data-nav="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3"/></svg>
        <span data-i18n="nav_dashboard">Dashboard</span>
      </a>
      <a href="analyze.html" class="nav-item" data-nav="analyze">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 8a2 2 0 0 1 2-2h1l1.5-2h7L17 6h1a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2Z"/><circle cx="12" cy="13" r="3.5"/></svg>
        <span data-i18n="nav_analyze">Analyze</span>
      </a>
      <a href="history.html" class="nav-item" data-nav="history">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3.5 2"/></svg>
        <span data-i18n="nav_history">History</span>
      </a>
      <a href="profile.html" class="nav-item" data-nav="profile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="3.5"/><path d="M4.5 20c1.5-4 5-5.5 7.5-5.5s6 1.5 7.5 5.5"/></svg>
        <span data-i18n="nav_profile">Profile</span>
      </a>
    </nav>
    <div class="sidebar-foot">
      <a href="login.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M15 17v1a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h7a2 2 0 0 1 2 2v1M9 12h11M17 8l3 4-3 4"/></svg>
        <span data-i18n="nav_logout">Log out</span>
      </a>
    </div>
  </aside>

  <main class="main">
    <div style="max-width:640px; margin-inline:auto;">
      <span class="eyebrow" data-i18n="profile_eyebrow">ACCOUNT</span>
      <h1 class="h-display h2" style="margin-top:10px; margin-bottom:var(--sp-5);" data-i18n="profile_h1">Profile & settings</h1>

      <div class="card fade-in" style="display:flex; align-items:center; gap:var(--sp-4); margin-bottom:var(--sp-5);">
        <div class="avatar" id="avatarInitial">A</div>
        <div style="flex:1;">
          <p style="font-weight:700; font-size:1.1rem;" id="profName">Amina</p>
          <p class="text-mid" style="font-size:0.85rem;" id="profMeta">24 · 58kg · 165cm</p>
        </div>
        <a href="onboarding.html" class="btn btn-ghost btn-sm" data-i18n="profile_edit">Edit profile</a>
      </div>

      <div class="card fade-in" style="margin-bottom:var(--sp-5);">
        <h3 class="h-display h3" data-i18n="profile_targets_t">Daily targets</h3>
        <div class="nutrient-grid" style="margin-top:var(--sp-4); grid-template-columns:repeat(4,1fr);">
          <div class="nutrient-cell"><p class="val mono" id="t-cal">1850</p><p class="text-mid" style="font-size:0.76rem;" data-i18n="cal">Calories</p></div>
          <div class="nutrient-cell"><p class="val mono" id="t-protein">120g</p><p class="text-mid" style="font-size:0.76rem;" data-i18n="protein">Protein</p></div>
          <div class="nutrient-cell"><p class="val mono" id="t-carbs">180g</p><p class="text-mid" style="font-size:0.76rem;" data-i18n="carbs">Carbs</p></div>
          <div class="nutrient-cell"><p class="val mono" id="t-fat">60g</p><p class="text-mid" style="font-size:0.76rem;" data-i18n="fat">Fat</p></div>
        </div>
      </div>

      <div class="card fade-in" style="margin-bottom:var(--sp-5);">
        <div class="settings-row">
          <span data-i18n="profile_diet_t">Dietary restrictions</span>
          <div class="chip-group" id="dietChipsView"></div>
        </div>
        <div class="settings-row">
          <span data-i18n="profile_lang_t">Language</span>
          <div class="lang-switch">
            <button type="button" data-lang="en">EN</button>
            <button type="button" data-lang="fr">FR</button>
            <button type="button" data-lang="ar">AR</button>
          </div>
        </div>
        <div class="settings-row">
          <span data-i18n="profile_units_t">Units</span>
          <div class="chip-group">
            <button class="chip selected" type="button" data-i18n="profile_units_metric">Metric</button>
            <button class="chip" type="button" data-i18n="profile_units_imperial">Imperial</button>
          </div>
        </div>
        <div class="settings-row">
          <span data-i18n="profile_notif_t">Meal reminders</span>
          <button class="toggle on" id="notifToggle" type="button"></button>
        </div>
      </div>

      <a href="login.html" class="btn btn-ghost btn-block" data-i18n="profile_logout">Log out</a>
    </div>
  </main>
</div>

<nav class="mobile-nav">
  <a href="dashboard.html" data-nav="dashboard"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3"/></svg><span data-i18n="nav_dashboard">Dashboard</span></a>
  <a href="analyze.html" data-nav="analyze"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 8a2 2 0 0 1 2-2h1l1.5-2h7L17 6h1a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2Z"/><circle cx="12" cy="13" r="3.5"/></svg><span data-i18n="nav_analyze">Analyze</span></a>
  <a href="history.html" data-nav="history"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3.5 2"/></svg><span data-i18n="nav_history">History</span></a>
  <a href="profile.html" data-nav="profile"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="3.5"/><path d="M4.5 20c1.5-4 5-5.5 7.5-5.5s6 1.5 7.5 5.5"/></svg><span data-i18n="nav_profile">Profile</span></a>
</nav>

<script src="js/i18n.js"></script>
<script src="js/state.js"></script>
<script src="js/app.js"></script>
<script>
const DIET_LABELS = {
  halal:'diet_halal', vegetarian:'diet_vegetarian', vegan:'diet_vegan', gluten_free:'diet_glutenfree'
};
function renderProfile(){
  const s = NouraState.get();
  const p = s.profile;
  document.getElementById('avatarInitial').textContent = p.name.charAt(0).toUpperCase();
  document.getElementById('profName').textContent = p.name;
  document.getElementById('profMeta').textContent = `${p.age} · ${p.weight_kg}kg · ${p.height_cm}cm`;
  document.getElementById('t-cal').textContent = p.daily_targets.calories;
  document.getElementById('t-protein').textContent = p.daily_targets.protein_g + 'g';
  document.getElementById('t-carbs').textContent = p.daily_targets.carbs_g + 'g';
  document.getElementById('t-fat').textContent = p.daily_targets.fat_g + 'g';

  const dietWrap = document.getElementById('dietChipsView');
  dietWrap.innerHTML = '';
  if(p.restrictions.length === 0){
    const chip = document.createElement('span');
    chip.className = 'chip selected';
    chip.setAttribute('data-i18n','diet_none');
    dietWrap.appendChild(chip);
  } else {
    p.restrictions.forEach(function(r){
      const chip = document.createElement('span');
      chip.className = 'chip selected';
      chip.setAttribute('data-i18n', DIET_LABELS[r] || r);
      dietWrap.appendChild(chip);
    });
  }
  NouraI18n.apply();
}
document.getElementById('notifToggle').addEventListener('click', function(){ this.classList.toggle('on'); });
renderProfile();
window.addEventListener('noura:langchange', renderProfile);
</script>
</body>
</html>
